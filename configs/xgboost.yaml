modelname: xgboost
params:
    hpo: true
    hpo_trials: 100
    cv_folds: 4
    hpo_config:
        learning_rate:
            type: float
            low: 1.0e-7
            high: 1
            log: true

        max_depth:
            type: int
            low: 1
            high: 10

        subsample:
            type: float
            low: 0.1
            high: 1.0

        colsample_bytree:
            type: float
            low: 0.2
            high: 1.0

        min_child_weight:
            type: float
            low: 1.0e-16
            high: 1.0e+5
            log: true

        reg_alpha:
            type: float
            low: 1.0e-16
            high: 1.0e+2
            log: true

        reg_lambda:
            type: float
            low: 1.0e-16
            high: 1.0e+2
            log: true

        gamma:
            type: float
            low: 1.0e-16
            high: 1.0e+2
            log: true

        n_estimators:
            type: int
            low: 10
            high: 4000

        penalty:
            type: categorical
            values: [l1, l2]

        
