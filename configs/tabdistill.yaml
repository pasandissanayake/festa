modelname: tabdistill
params: 
  batch_size: 256
  learning_rate: 2.0e-4
  weight_decay: 0.0
  lr_scheduler: false
  n_epochs: 100

  mlp_width: 128
  mlp_depth: 2
  mlp_learning_rate: 1.0e-4
  mlp_weight_decay: 1.0e-5
  mlp_n_epochs: 1000
  add_dropout: true
  dropout_p: 0.1

  hpo: true
  hpo_trials: 20
  cv_folds: 4
  hpo_config:
    learning_rate: 
      type: loguniform
      low: 1.0e-5
      high: 1.0e-3

    weight_decay: 
      type: categorical
      values: [0.0, 1.0e-5, 1.0e-4]
    
    n_epochs: 
      type: categorical
      values: [0, 10, 100]

    mlp_width: 
      type: categorical
      values: [10, 128]

    mlp_depth: 
      type: categorical
      values: [2, 3]

    mlp_learning_rate: 
      type: loguniform
      low: 1.0e-5
      high: 1.0e-2

    mlp_weight_decay: 
      type: categorical
      values: [0.0, 1.0e-5, 1.0e-4]

    mlp_n_epochs: 
      type: categorical
      values: [10, 100, 1000]

    dropout_p: 
      type: uniform
      low: 0.0
      high: 0.5