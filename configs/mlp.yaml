modelname: mlp
params:
    depth: 2
    width: 128
    dropout: 0.1
    normalization: None
    activation: relu
    optimizer: AdamW
    learning_rate: 0.001
    weight_decay: 0.0001
    lr_scheduler: false
    n_epochs: 100

    hpo: true
    hpo_trials: 2
    cv_folds: 4
    hpo_config: 
        depth: {type: categorical, values: [1, 2, 3]}
        width: {type: categorical, values: [16, 32, 64, 128, 256, 512]}
        dropout: {type: categorical, values: [0, 0.1, 0.3]}
        activation: {type: categorical, values:[relu, elu, tanh]}
        learning_rate: {type: loguniform, low: 0.00001, high: 0.01}
        weight_decay: {type: loguniform, low: 0.00001, high: 0.01}
        n_epochs: {type: categorical, values: [10, 100, 1000]}

