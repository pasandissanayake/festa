modelname: catboost
params:
    learning_rate: 0.1
    random_strength: 1
    l2_leaf_reg: 3.0
    bagging_temperature: 0.5
    leaf_estimation_iterations: 10
    iterations: 1000

    hpo: true
    hpo_trials: 100
    cv_folds: 4
    hpo_config:
        learning_rate:
            type: float
            low: 1.0e-5
            high: 1.0
            log: true

        random_strength:
            type: int
            low: 1
            high: 20

        l2_leaf_reg:
            type: float
            low: 1.0
            high: 10.0
            log: true

        bagging_temperature:
            type: float
            low: 0.0
            high: 1.0

        leaf_estimation_iterations:
            type: int
            low: 1
            high: 20

        iterations:
            type: int
            low: 100
            high: 4000