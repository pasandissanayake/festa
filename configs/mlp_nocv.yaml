modelname: mlp
params:
    depth: 2
    width: 128
    dropout: 0.1
    normalization: None
    activation: relu
    optimizer: AdamW
    learning_rate: 1.0e-4
    weight_decay: 1.0e-5
    lr_scheduler: false
    n_epochs: 1000

    hpo: false
